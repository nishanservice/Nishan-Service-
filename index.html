<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit & Withdraw</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    text-align: center;
    padding: 40px;
}

.card {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

h1 {
    color: #2c3e50;
}

/* Number + Copy */
.number-box {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #ecf0f1;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    margin: 15px 0;
}

.number-text {
    font-size: 18px;
    font-weight: bold;
    color: #27ae60;
}

/* Copy Icon */
.copy-icon {
    font-size: 18px;
    color: #555;
}

/* Message */
.message {
    font-size: 15px;
    color: #555;
    margin-bottom: 25px;
}

/* Button Wrapper */
.btn-wrapper {
    position: relative;
    display: inline-block;
    padding: 30px;
}

/* WhatsApp Button */
.whatsapp-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background-color: #25D366;
    color: white;
    padding: 12px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    position: relative;
    z-index: 2;
}

/* Arrows */
.arrow {
    position: absolute;
    color: red;
    font-size: 22px;
    animation: pulse 1.5s infinite;
}

.arrow.top    { top: 0; left: 50%; transform: translate(-50%, -50%); }
.arrow.bottom { bottom: 0; left: 50%; transform: translate(-50%, 50%); }
.arrow.left   { left: 0; top: 50%; transform: translate(-50%, -50%); }
.arrow.right  { right: 0; top: 50%; transform: translate(50%, -50%); }

@keyframes pulse {
    0%   { opacity: 0.3; transform: scale(0.8); }
    50%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0.3; transform: scale(0.8); }
}

/* Note */
.note {
    margin-top: 15px;
    font-size: 14px;
    color: #777;
}

/* Copy message */
.copy-msg {
    font-size: 13px;
    color: green;
    display: none;
}
</style>

</head>

<body>

<div class="card">
    <h1>Deposit & Withdraw</h1>

    <!-- Number with icon -->
    <div class="number-box" onclick="copyNumber()">
        <span class="number-text">074 306 62 34</span>
        <span class="copy-icon">📋</span>
    </div>
    <div id="copied" class="copy-msg">Number copied!</div>

    <div class="message">
        Nishan Service Deposit number එක දැනට band වී ඇත, ඉහත number එක හරහා සම්බන්ද වෙන්න.
    </div>

    <div class="btn-wrapper">
        <div class="arrow top">⬇</div>
        <div class="arrow bottom">⬆</div>
        <div class="arrow left">➡</div>
        <div class="arrow right">⬅</div>

        <a href="https://wa.me/94743066234" target="_blank" class="whatsapp-btn">
            <img src="https://img.icons8.com/ios-filled/24/ffffff/whatsapp.png"/>
            WhatsApp
        </a>
    </div>

    <div class="note">
        මේ බටන් එක ඔබන්න එවිට අපව සම්බන්ධ කරගත හැක.
    </div>
</div>

<script>
function copyNumber() {
    const text = "0743066234";
    navigator.clipboard.writeText(text);

    const msg = document.getElementById("copied");
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
