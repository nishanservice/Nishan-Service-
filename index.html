<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit & Withdraw</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0d1b2a;
        color: white;
        text-align: center;
        padding: 50px;
    }

    .box {
        background: #1b263b;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    h2 {
        margin-bottom: 15px;
    }

    p {
        margin-bottom: 10px;
        font-size: 16px;
    }

    .number {
        font-size: 18px;
        font-weight: bold;
        color: #00c3ff;
        margin-bottom: 20px;
    }

    .whatsapp-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #25D366;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }

    .whatsapp-btn:hover {
        background: #1ebe5d;
    }

    .whatsapp-btn img {
        width: 22px;
        height: 22px;
    }

    .click-text {
        margin-top: 15px;
        font-size: 14px;
        color: #ccc;
    }
</style>

</head>
<body>

<div class="box">
    <h2>Deposit & Withdraw</h2>
    
    <p>මෙම number එක සම්බන්ධ කර ගන්න</p>
    <div class="number">0711209365</div>

    <a class="whatsapp-btn" 
       href="https://wa.me/94711209365?text=Deposit" 
       target="_blank">
       
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        WhatsApp Message යවන්න
    </a>

    <div class="click-text">👉 Button එක ඔබන්න</div>
</div>

</body>
</html>
